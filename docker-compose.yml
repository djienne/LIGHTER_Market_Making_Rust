services:
  lighter-mm:
    build:
      context: .
      dockerfile: Dockerfile
    image: lighter-mm-rust:local
    container_name: lighter-mm
    init: true
    stop_signal: SIGINT
    stop_grace_period: 45s
    restart: "no"
    user: "${LIGHTER_UID:-1000}:${LIGHTER_GID:-1000}"
    env_file:
      - ${LIGHTER_ENV_FILE:-/home/ubuntu/lighter_MM/.env}
    environment:
      RUST_LOG: "${RUST_LOG:-info}"
    volumes:
      - ./config.json:/app/config.json:ro
      - ./logs:/app/logs
    command:
      - --symbol
      - "${MARKET_SYMBOL:-BTC}"
      - --config
      - /app/config.json
      - --live
